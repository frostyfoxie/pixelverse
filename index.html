<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>My Google AI Studio App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap" rel="stylesheet">
  </head>
  
    <style>
      /* Target the entire page */
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        /* 100dvh perfectly calculates the height MINUS the browser address bars/menus */
        height: 100dvh !important; 
        overflow: hidden !important; /* Disables scrolling so nothing hides off-screen */
        background-color: #000; /* Black background behind your project */
        
        /* Centers your project perfectly */
        display: flex;
        justify-content: center;
        align-items: center;
      }
      /* Target Vite's default container, or your game canvas */
      #app, canvas, #root {
        width: 100% !important;
        height: 100% !important;
        max-width: 100vw !important;
        max-height: 100dvh !important;
        /* This prevents things from stretching weirdly and keeps them inside the screen */
        object-fit: contain !important; 
      }
    </style><body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
